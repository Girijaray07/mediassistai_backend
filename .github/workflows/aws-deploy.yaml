name: AWS EC2 Auto Deploy

on:
  workflow_run:
    workflows: ["Docker Build & Push Action"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    steps:
      # Connect to EC2 & Deploy Latest Docker Image
      - name: Deploy Latest Docker Image to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22

          script: |
            echo "Pulling latest Docker image..."

            sudo docker pull giriraj64/mediassistai_backend:latest

            echo "Stopping existing container..."

            sudo docker stop mediassist || true
            sudo docker rm mediassist || true

            echo "Starting new container..."

            sudo docker run -d \
              --restart unless-stopped \
              --name mediassist \
              -p 8000:8000 \
              --env-file /home/ubuntu/.env \
              giriraj64/mediassistai_backend:latest

            echo "Deployment completed successfully!"